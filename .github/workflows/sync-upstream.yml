name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/ebts/jet.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream has $BEHIND new commit(s)"

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git merge upstream/master --no-edit || echo "conflict=true" >> "$GITHUB_OUTPUT"

      - name: Push if clean merge
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict != 'true'
        run: git push origin master

      - name: Create PR if conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          git merge --abort
          git checkout -b sync/upstream-$(date +%Y%m%d)
          git merge upstream/master --no-edit || true
          git add -A
          git commit -m "chore: sync upstream (conflicts need manual resolution)" || true
          git push origin sync/upstream-$(date +%Y%m%d)
          gh pr create \
            --title "chore: sync upstream ebts/jet (conflicts)" \
            --body "Automated sync from upstream ebts/jet. There are merge conflicts that need manual resolution." \
            --head sync/upstream-$(date +%Y%m%d) \
            --base master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
